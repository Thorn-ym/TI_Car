<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1040" viewBox="0 0 1180 1040">
  <defs>
    <style>
      .bg { fill: #fbfaf2; }
      .grid { stroke: #eee8d8; stroke-width: 1; }
      .board { fill: #f8fbff; stroke: #b7c7d6; stroke-width: 2; }
      .chip { fill: #1f2a33; stroke: #0e1419; stroke-width: 2; }
      .pin { fill: #fffdf5; stroke: #9f8a37; stroke-width: 4; }
      .pinText { font: 700 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #237b3b; }
      .pinTextPurple { font: 700 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #8a35a8; }
      .powerText { font: 700 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #d81b60; }
      .groundText { font: 700 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #222; }
      .title { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2a33; }
      .sub { font: 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #5b6872; }
      .labelText { font: 700 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: white; }
      .small { font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #49606f; }
      .wire { fill: none; stroke-width: 2.4; }
      .i2c { fill: #00a991; stroke: #00a991; }
      .uart { fill: #ff9800; stroke: #ff9800; }
      .motor { fill: #3f51e8; stroke: #3f51e8; }
      .enc { fill: #00acc1; stroke: #00acc1; }
      .line { fill: #009688; stroke: #009688; }
      .can { fill: #795548; stroke: #795548; }
      .oled { fill: #2e7d32; stroke: #2e7d32; }
      .io { fill: #8bc34a; stroke: #8bc34a; }
      .adc { fill: #f06292; stroke: #f06292; }
      .servo { fill: #ab47bc; stroke: #ab47bc; }
      .power { fill: #e91e63; stroke: #e91e63; }
      .gnd { fill: #333; stroke: #333; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#9aa8b1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect class="bg" width="1180" height="1040"/>
